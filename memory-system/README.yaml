## 二、被动沉淀轨道（Memory）：从对话到核心认知的五层结构

### L0 状态层（Working Memory）

- **输入**：当前对话消息、任务指令、临时数据
- **输出**：即时响应所需的上下文
- **存储**：当前会话的消息历史、正在处理的文件、临时变量
- **沉淀条件**：
  - 会话结束时
  - 检测到值得记录的事件（如完成重要任务、表达明确偏好）
  - 对话轮次超过阈值（如 10 轮）时自动生成摘要
- **备注**：链接到 "对话记录/" 目录，已实现今日对话的自动记录

### L1 情境层（Episodic Memory）

- **输入**：L0 沉淀的对话摘要、事件记录、项目进展
- **输出**：近期上下文（如 "最近在做什么"" 上次聊了什么"）
- **存储**：
  - 按日期归档的近期对话摘要
  - 当前项目状态
  - 近期决策记录
  - 待办事项与关注点
- **沉淀条件**：
  - 同一行为模式出现 3 次以上 → 沉淀为习惯
  - 发现重复操作偏好 → 沉淀为行为偏好
  - 周 / 月复盘时人工确认
- **清理条件**：超过 30 天的情境记忆自动归档或删除

### L2 行为层（Procedural Memory）

- **输入**：L1 沉淀的重复行为模式、操作习惯
- **输出**：行为预测（如 "用户可能喜欢这样做"）、个性化建议
- **存储**：
  - 工作习惯（如：先看大纲再写内容）
  - 沟通风格（如：偏好简洁直接的回答）
  - 工具偏好（如：常用 Notion、偏好 YAML 格式）
  - 时间模式（如：早上处理复杂任务）
- **沉淀条件**：
  - 行为背后发现稳定思维模式 → 沉淀为认知模式
  - 多个习惯指向同一决策原则 → 沉淀为决策框架
  - 季度复盘时人工确认

### L3 认知层（Semantic Memory）

- **输入**：L2 沉淀的思维模式、决策框架
- **输出**：决策支持（如 "基于你的思维方式，建议..."）、深度理解
- **存储**：
  - 思维模式（如：系统性思考、先原理后应用）
  - 决策框架（如：重要紧急矩阵、成本收益分析）
  - 心智模型（如：第一性原理、增长思维）
  - 知识结构（如：擅长领域、学习方式）
- **沉淀条件**：
  - 认知模式背后发现核心价值驱动 → 沉淀为价值观
  - 多个决策框架指向同一人生信念 → 沉淀为核心信念
  - 年度复盘时人工深度反思

### L4 核心层（Core Identity）

- **输入**：L3 沉淀的价值观洞察、人工深度反思
- **输出**：身份认同（"我是谁"）、终极决策依据
- **存储**：
  - 核心价值观（如：追求真实、重视深度）
  - 人生信念（如：持续学习、创造价值）
  - 性格特征（如：内向、分析型）
  - 决策原则（如：长期主义、先人后事）
- **特殊规则**：
  - 仅允许人工修改，AI 无法自动更新
  - 每次修改需记录原因与时间（留存演变历史）
  - 作为其他层级的 "校准锚点"，确保记忆不偏离核心自我

