## 三、主动输入轨道（Intent）：主动规划与约束

用于承载用户主动提出的目标、偏好与边界，避免短期需求与长期自我认知混淆：

- **目标与规划.yaml**：短期 / 长期目标、项目规划、待办事项
- **偏好与要求.yaml**：交互偏好、内容风格要求、服务期望
- **约束与边界.yaml**：决策红线、禁忌事项、行为边界

---

## 四、系统元数据（Meta）：迭代与复盘

- **洞察队列.yaml**：待沉淀的用户洞察、待确认的记忆点
- **框架演变.yaml**：记忆系统的版本迭代、设计变更记录
- **复盘记录/**：
  - **复盘模板.yaml**：周 / 月 / 季 / 年度复盘模板，用于评估记忆沉淀效果、调整系统规则

---

## 五、设计初衷与价值

1. **核心目标**：通过与 AI 的日常交互，抽象提炼个人的价值观、性格特征、心智模式、思维模式、工作习惯、行为偏好、决策原则等，让 AI 更好地协作，甚至模拟个人决策。
2. **动态更新**：基于对话自动沉淀 + 人工定期复盘，实现记忆系统的持续迭代。
3. **迁移价值**：记忆库可基于 IDE 工作台（如 Cursor、Claude Code 等）沉淀，实现跨 AI 应用的记忆迁移，不受单一平台限制。
4. **自我认知**：同时也是个人认知自我、了解自我的工具，帮助清晰看见自身的行为逻辑与核心信念。

---

## 六、提示词（Prompt）

> 我希望建立一套我与 AI 交互的记忆系统，帮助我抽象和提炼出自己的价值观、性格特征、心智模式、思维模式、工作习惯、行为偏好、决策原则、关注方向等，将来可以让 AI 更好地与我合作，甚至模拟我的决策。你帮我想想这套记忆系统该怎么搭建，它应该是一个可以根据我与 AI 的日常互动，能够学习和迭代的，实现持续动态更新的记忆系统。
