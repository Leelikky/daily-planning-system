## 月复盘模板

```markdown
# 月复盘 - [月份]

month: [YYYY-MM]

### 一、本月概览

- 完成任务数：[N]
- 完成率：[X%]
- 关键成果：[成果列表]

### 二、行为习惯确认

| 习惯 | 出现次数 | 是否确认沉淀 |
|------|----------|--------------|
| [习惯1] | [N次] | 是/否 |

### 三、认知模式发现

- [模式1]: [描述]
- [模式2]: [描述]

### 四、目标进展评估

| 目标 | 进度 | 状态 | 备注 |
|------|------|------|------|
| [目标1] | [X%] | 进行中/完成/延期 | [备注] |

### 五、下月重点

1. [重点1]
2. [重点2]

### 六、待沉淀到L3的认知模式

- [ ] [模式1]
- [ ] [模式2]
```

