## 季度复盘模板

```markdown
# 季度复盘 - [季度]

quarter: Q[X] [YYYY]

### 一、季度成就

- [成就1]
- [成就2]

### 二、行为习惯总结

已确认的习惯：
- [习惯1]
- [习惯2]

### 三、思维模式分析

- [思维模式1]
- [思维模式2]

### 四、价值观校验

| 行为模式 | 背后的价值观 | 是否一致 |
|----------|--------------|----------|
| [行为] | [价值观] | 是/否 |

### 五、目标完成情况

| 目标 | 完成状态 | 反思 |
|------|----------|------|
| [目标1] | 完成/未完成 | [反思] |

### 六、下季度重点

1. [重点1]
2. [重点2]

### 七、待沉淀到L3/L4的内容

- L3 认知层候选：[列表]
- L4 核心层候选：[列表]
```

