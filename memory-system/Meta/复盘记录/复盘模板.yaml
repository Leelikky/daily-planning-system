## 周复盘模板

```markdown
# 周复盘 - [日期范围]

period: [起始日期] ~ [结束日期]

### 一、本周成就

- [ ] [成就1]
- [ ] [成就2]

### 二、本周挑战

- [挑战1]: [应对方式]
- [挑战2]: [应对方式]

### 三、行为模式发现

| 观察到的行为 | 出现频率 | 是否沉淀到L2 |
|--------------|----------|--------------|
| [行为1] | [N次] | 是/否 |
| [行为2] | [N次] | 是/否 |

### 四、目标进展

| 目标 | 本周进展 | 下周计划 |
|------|----------|----------|
| [目标1] | [进展] | [计划] |

### 五、下周重点

1. [重点1]
2. [重点2]

### 六、待沉淀到L2的习惯

- [ ] [习惯1]
- [ ] [习惯2]
```

